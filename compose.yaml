# codebase-memory-mcp — Docker Compose for local runtime
#
# Usage:
#   docker compose up -d              # start MCP server + graph UI
#   open http://localhost:9749         # 3D graph visualization
#
# The image includes the graph UI. The MCP server runs over stdio
# (JSON-RPC 2.0). The UI server binds to 127.0.0.1:9749 inside the
# container; network_mode: host shares the host's network stack so
# the browser can reach it. On Docker Desktop (WSL2), host networking
# is supported via the WSL2 backend.

services:
  codebase-memory-mcp:
    image: ghcr.io/jzkk720/codebase-memory-mcp:latest
    stdin_open: true
    tty: true
    network_mode: host
    volumes:
      - cbm-data:/data
    environment:
      - CBM_CACHE_DIR=/data
      # - CBM_WORKERS=4
      # - CBM_LOG_LEVEL=info
      # - CBM_SEMANTIC_ENABLED=true
      # - CBM_SEMANTIC_THRESHOLD=0.75
    restart: unless-stopped

volumes:
  cbm-data:
    driver: local